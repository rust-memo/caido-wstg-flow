name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Verify release version
        run: |
          test "v$(node -p "require('./package.json').version")" = "$GITHUB_REF_NAME"
          grep -q "version: \"${GITHUB_REF_NAME#v}\"" caido.config.ts
          test "$(node -p "require('./packages/backend/package.json').version")" = "${GITHUB_REF_NAME#v}"
          test "$(node -p "require('./packages/frontend/package.json').version")" = "${GITHUB_REF_NAME#v}"
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test:coverage
      - run: pnpm lint
      - run: pnpm knip
      - run: pnpm audit --audit-level high
      - run: pnpm build
      - name: Create checksum
        run: cd dist && sha256sum plugin_package.zip > SHA256SUMS
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          dist/plugin_package.zip dist/SHA256SUMS
          --title "WSTG Flow for Caido $GITHUB_REF_NAME"
          --generate-notes
